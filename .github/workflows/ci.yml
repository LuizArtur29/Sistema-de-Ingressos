name: Continuous Integration (CI)

on:
  push:
    branches: [  ]
  pull_request:
    branches: [  ]

jobs:
  test-and-validate:
    name: Testes e Validação de Código
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar o ambiente Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Criar ficheiro .env temporário para os testes
        run: |
          echo "DB_LOCAL=testdb" >> .env
          echo "DB_LOCAL_USER=testuser" >> .env
          echo "DB_LOCAL_PASS=testpass" >> .env
          echo "JWT_SECRET_BASE64=9a4f632e2225243a612141243161242131231231231231231231231231231231" >> .env

      - name: Executar a Suite de Testes e Validação JaCoCo
        working-directory: ./backend
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Scan de Segurança
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  docker-simulation:
    name: Simulação de Build Docker
    runs-on: ubuntu-latest
    needs: test-and-validate

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Executar o Build fictício do Dockerfile
        run: |
          docker build -t venda-ingressos-api:test ./backend